name: Jarvis

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  jarvis:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run Jarvis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'EOF'
          import os, json, requests, anthropic
          from datetime import datetime

          TELEGRAM_TOKEN = os.environ["TELEGRAM_BOT_TOKEN"]
          ANTHROPIC_API_KEY = os.environ["ANTHROPIC_API_KEY"]
          GITHUB_TOKEN = os.environ["GITHUB_TOKEN"]
          GITHUB_REPO = "mygdxb-lab/Jarvis_Assisstant"
          OFFSET_FILE = "memory/telegram-offset.json"
          TELEGRAM_API = f"https://api.telegram.org/bot{TELEGRAM_TOKEN}"

          client = anthropic.Anthropic(api_key=ANTHROPIC_API_KEY)

          def github_get(path):
              url = f"https://api.github.com/repos/{GITHUB_REPO}/contents/{path}"
              r = requests.get(url, headers={"Authorization": f"token {GITHUB_TOKEN}"})
              if r.status_code == 200:
                  import base64
                  return base64.b64decode(r.json()["content"]).decode("utf-8"), r.json()["sha"]
              return None, None

          def github_update(path, content, sha, message):
              import base64
              url = f"https://api.github.com/repos/{GITHUB_REPO}/contents/{path}"
              requests.put(url, headers={"Authorization": f"token {GITHUB_TOKEN}"}, json={
                  "message": message,
                  "content": base64.b64encode(content.encode()).decode(),
                  "sha": sha
              })

          def load_memory():
              profile, _ = github_get("memory/my-profile.md")
              learnings, _ = github_get("memory/global-learnings.md")
              return profile or "", learnings or ""

          def save_learning(insight):
              content, sha = github_get("memory/global-learnings.md")
              if content and sha:
                  timestamp = datetime.utcnow().strftime("%Y-%m-%d %H:%M")
                  updated = content + f"\n- [{timestamp}] {insight}"
                  github_update("memory/global-learnings.md", updated, sha, "memory: new learning")

          def get_offset():
              content, _ = github_get(OFFSET_FILE)
              if content:
                  try:
                      return json.loads(content).get("offset", None)
                  except:
                      return None
              return None

          def save_offset(offset):
              content, sha = github_get(OFFSET_FILE)
              new_content = json.dumps({"offset": offset})
              if sha:
                  github_update(OFFSET_FILE, new_content, sha, "chore: update telegram offset")

          def send_message(chat_id, text):
              requests.post(f"{TELEGRAM_API}/sendMessage", json={
                  "chat_id": chat_id,
                  "text": text,
                  "parse_mode": "Markdown"
              })

          def ask_jarvis(text, profile, learnings):
              system = f"""You are Jarvis, a personal AI assistant and second brain.
          Owner profile:
          {profile}

          Learnings:
          {learnings}

          Be direct, concise, proactive. If you learn something new end with LEARNING: <insight>
          Current time: {datetime.utcnow().strftime("%Y-%m-%d %H:%M")} UTC"""

              r = client.messages.create(
                  model="claude-sonnet-4-6",
                  max_tokens=1000,
                  system=system,
                  messages=[{"role": "user", "content": text}]
              )
              return r.content[0].text

          print("Jarvis checking messages...")
          profile, learnings = load_memory()
          offset = get_offset()

          params = {"timeout": 10}
          if offset:
              params["offset"] = offset
          updates = requests.get(f"{TELEGRAM_API}/getUpdates", params=params).json().get("result", [])

          for update in updates:
              offset = update["update_id"] + 1
              msg = update.get("message", {})
              chat_id = msg.get("chat", {}).get("id")
              text = msg.get("text", "")
              if not text or not chat_id:
                  continue
              print(f"Message: {text}")
              reply = ask_jarvis(text, profile, learnings)
              if "LEARNING:" in reply:
                  parts = reply.split("LEARNING:")
                  clean_reply = parts[0].strip()
                  save_learning(parts[1].strip())
              else:
                  clean_reply = reply
              send_message(chat_id, clean_reply)

          if offset:
              save_offset(offset)
          print("Jarvis done.")
          EOF

