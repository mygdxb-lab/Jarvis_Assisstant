name: Jarvis

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  jarvis:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run Jarvis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'EOF'
          import os, json, requests, anthropic, base64
          from datetime import datetime

          TELEGRAM_TOKEN = os.environ["TELEGRAM_BOT_TOKEN"]
          ANTHROPIC_API_KEY = os.environ["ANTHROPIC_API_KEY"]
          GITHUB_TOKEN = os.environ["GITHUB_TOKEN"]
          GITHUB_REPO = "mygdxb-lab/Jarvis_Assisstant"
          OFFSET_FILE = "memory/telegram-offset.json"
          TELEGRAM_API = f"https://api.telegram.org/bot{TELEGRAM_TOKEN}"

          client = anthropic.Anthropic(api_key=ANTHROPIC_API_KEY)

          def github_get(path):
              url = f"https://api.github.com/repos/{GITHUB_REPO}/contents/{path}"
              r = requests.get(url, headers={"Authorization": f"token {GITHUB_TOKEN}"})
              if r.status_code == 200:
                  return base64.b64decode(r.json()["content"]).decode("utf-8"), r.json()["sha"]
              return None, None

          def github_update(path, content, sha, message):
              url = f"https://api.github.com/repos/{GITHUB_REPO}/contents/{path}"
              requests.put(url, headers={"Authorization": f"token {GITHUB_TOKEN}"}, json={
                  "message": message,
                  "content": base64.b64encode(content.encode()).decode(),
                  "sha": sha
              })

          def load_memory():
              profile, profile_sha = github_get("memory/my-profile.md")
              learnings, learnings_sha = github_get("memory/global-learnings.md")
              return profile or "", profile_sha, learnings or "", learnings_sha

          def update_profile(profile, profile_sha, conversation):
              prompt = f"""Based on this conversation, update the user profile below.
          Extract personality traits, working style, projects, preferences, goals.
          Return the COMPLETE updated profile in markdown. Do not shrink existing content.
          Only add or refine. Keep it clean and structured.

          Current profile:
          {profile}

          New conversation:
          {conversation}

          Return only the updated markdown profile, nothing else."""
              r = client.messages.create(
                  model="claude-sonnet-4-6",
                  max_tokens=2000,
                  messages=[{"role": "user", "content": prompt}]
              )
              github_update("memory/my-profile.md", r.content[0].text.strip(), profile_sha, "memory: profile updated")

          def save_learning(insight, learnings, learnings_sha):
              timestamp = datetime.utcnow().strftime("%Y-%m-%d %H:%M")
              updated = learnings + f"\n- [{timestamp}] {insight}"
              github_update("memory/global-learnings.md", updated, learnings_sha, "memory: new learning")

          def get_offset():
              content, _ = github_get(OFFSET_FILE)
              if content:
                  try:
                      return json.loads(content).get("offset", None)
                  except:
                      return None
              return None

          def save_offset(offset):
              content, sha = github_get(OFFSET_FILE)
              new_content = json.dumps({"offset": offset})
              if sha:
                  github_update(OFFSET_FILE, new_content, sha, "chore: update telegram offset")

          def send_message(chat_id, text):
              requests.post(f"{TELEGRAM_API}/sendMessage", json={
                  "chat_id": chat_id,
                  "text": text,
                  "parse_mode": "Markdown"
              })

          def get_image_base64(file_id):
              file_info = requests.get(f"{TELEGRAM_API}/getFile?file_id={file_id}").json()
              file_path = file_info["result"]["file_path"]
              file_url = f"https://api.telegram.org/file/bot{TELEGRAM_TOKEN}/{file_path}"
              img_data = requests.get(file_url).content
              return base64.standard_b64encode(img_data).decode("utf-8")

          def ask_jarvis(text, profile, learnings, image_base64=None):
              system = f"""You are Jarvis, a personal AI assistant and second brain.

          Owner profile:
          {profile}

          Accumulated learnings:
          {learnings}

          Rules:
          - Be direct and concise
          - Reference past context naturally
          - Be proactive — flag issues, connect dots, suggest ideas
          - Push back when needed
          - If you learn something new about your owner end with: LEARNING: <one line insight>

          Current time: {datetime.utcnow().strftime("%Y-%m-%d %H:%M")} UTC"""

              if image_base64:
                  content = [
                      {
                          "type": "image",
                          "source": {
                              "type": "base64",
                              "media_type": "image/jpeg",
                              "data": image_base64
                          }
                      },
                      {
                          "type": "text",
                          "text": text if text else "What do you see in this image? Give me your analysis."
                      }
                  ]
              else:
                  content = text

              r = client.messages.create(
                  model="claude-sonnet-4-6",
                  max_tokens=1000,
                  system=system,
                  messages=[{"role": "user", "content": content}]
              )
              return r.content[0].text

          print("Jarvis checking messages...")
          profile, profile_sha, learnings, learnings_sha = load_memory()
          offset = get_offset()

          params = {"timeout": 10}
          if offset:
              params["offset"] = offset
          updates = requests.get(f"{TELEGRAM_API}/getUpdates", params=params).json().get("result", [])

          for update in updates:
              offset = update["update_id"] + 1
              msg = update.get("message", {})
              chat_id = msg.get("chat", {}).get("id")
              if not chat_id:
                  continue

              text = msg.get("text", "")
              caption = msg.get("caption", "")
              photo = msg.get("photo")
              image_base64 = None

              # Handle image messages
              if photo:
                  print("Image received")
                  largest = photo[-1]
                  image_base64 = get_image_base64(largest["file_id"])
                  text = caption or ""

              if not text and not image_base64:
                  continue

              print(f"Message: {text or '[image]'}")
              reply = ask_jarvis(text, profile, learnings, image_base64)

              if "LEARNING:" in reply:
                  parts = reply.split("LEARNING:")
                  clean_reply = parts[0].strip()
                  save_learning(parts[1].strip(), learnings, learnings_sha)
              else:
                  clean_reply = reply

              send_message(chat_id, clean_reply)

              conversation = f"User: {text or '[sent an image]'}\nJarvis: {clean_reply}"
              update_profile(profile, profile_sha, conversation)
              print("Done.")

          if offset:
              save_offset(offset)
          print("Jarvis done.")
          EOF
